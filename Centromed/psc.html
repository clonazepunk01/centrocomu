<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar cita</title>
    <link rel="stylesheet" href="source/stylepsc.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="navbar-brand">Psicóloga</div>
            <ul class="navbar-menu">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">Agenda</a></li>
                <li><a href="#">Pacientes</a></li>
                <li><a href="#">Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="agenda">
            <h2>Mi Agenda</h2>
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Paciente</th>
                        <th>Detalles</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Aquí se rellenarán las citas -->
                    <tr>
                        <td>01/10/2024</td>
                        <td>10:00</td>
                        <td>Juan Pérez</td>
                        <td><button class="btn">Ver Detalles</button></td>
                    </tr>
                    <!-- Más filas según las citas -->
                </tbody>
            </table>
        </section>

        <section class="patients">
            <h2>Gestión de Pacientes</h2>
            <button class="btn" onclick="showAddPatientForm()">Agregar Paciente</button>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Email</th>
                        <th>Teléfono</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Aquí se rellenarán los pacientes -->
                    <tr>
                        <td>Juan Pérez</td>
                        <td>juan.perez@example.com</td>
                        <td>+123 456 7890</td>
                        <td>
                            <button class="btn" onclick="editPatient('1')">Editar</button>
                            <button class="btn btn-danger" onclick="deletePatient('1')">Eliminar</button>
                        </td>
                    </tr>
                    <!-- Más filas según los pacientes -->
                </tbody>
            </table>
        </section>

        <section id="add-patient-form" class="modal hidden">
            <div class="modal-content">
                <span class="close" onclick="hideAddPatientForm()">&times;</span>
                <h2>Agregar Paciente</h2>
                <form id="patient-form">
                    <label for="name">Nombre:</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <label for="phone">Teléfono:</label>
                    <input type="tel" id="phone" name="phone" required>
                    <button type="submit" class="btn">Guardar</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Centro. Todos los derechos reservados.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
